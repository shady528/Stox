services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.online
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    volumes:
      - ./server/data:/app/data
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        REACT_APP_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped
